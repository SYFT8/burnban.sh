name: verify

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  installers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.25.12
          cache: false
      - name: Validate installer source
        shell: bash
        run: |
          set -euo pipefail
          bash -n install sync
          shellcheck install sync
          pwsh -NoLogo -NoProfile -Command \
            '[void][scriptblock]::Create((Get-Content -Raw install.ps1)); [void][scriptblock]::Create((Get-Content -Raw sync.ps1))'
          grep -F '".burnban-stage-"' install.ps1 >/dev/null
          grep -F 'Write-Warning "Could not launch Burnban binary' install.ps1 >/dev/null
          if grep -Fq '".burnban-install-"' install.ps1; then
            echo "free Windows installer uses an elevation-prone staging filename" >&2
            exit 1
          fi
          grep -F "VERSION_INPUT=\"\${BURNBAN_SYNC_VERSION:-v0.2.0}\"" sync >/dev/null
          grep -F "\$VersionInput = if (\$env:BURNBAN_SYNC_VERSION) { \$env:BURNBAN_SYNC_VERSION } else { \"v0.2.0\" }" sync.ps1 >/dev/null
          grep -F 'pst_*)' sync >/dev/null
          grep -F 'tst_*)' sync >/dev/null
          grep -F 'pst_[A-Za-z0-9_-]{16,}' sync.ps1 >/dev/null
          grep -F 'tst_[A-Za-z0-9_-]{16,}' sync.ps1 >/dev/null
          grep -F 'pst_ Personal or tst_ Team management token' sync >/dev/null
          grep -F 'pst_ Personal or tst_ Team management token' sync.ps1 >/dev/null
          grep -F "/api/v1/\$release_product/releases/\$VERSION" sync >/dev/null
          grep -F "/api/v1/\$ReleaseProduct/releases/\$Version" sync.ps1 >/dev/null
          grep -F 'Authorization: Bearer %s' sync >/dev/null
          grep -F "Authorization = \"Bearer \$AccountToken\"" sync.ps1 >/dev/null
          grep -F -- '--max-redirs 0' sync >/dev/null
          grep -F -- '-MaximumRedirection 0' sync.ps1 >/dev/null
          if grep -Eqi \
            'not live yet|Sync release pending|release host pending|not buyer-accessible yet|retry after the published launch' \
            sync sync.ps1; then
            echo "paid installer contains stale pending-release copy" >&2
            exit 1
          fi
          if grep -Fq 'github.com/SYFT8/burnban.dev/releases/download' sync sync.ps1; then
            echo "paid installers must use the authenticated release API" >&2
            exit 1
          fi
          if git grep -n -i -E 'ph[cx]_|posthog[.]com' -- .; then
            echo "PostHog token or endpoint must not be present in the current installer site" >&2
            exit 1
          fi
      - name: Run default gitleaks history rules
        run: go run github.com/zricethezav/gitleaks/v8@v8.30.1 git --redact --no-banner .
